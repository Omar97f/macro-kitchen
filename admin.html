<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Macro's Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ───────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:        #e53935;
  --red-dark:   #b71c1c;
  --red-glow:   rgba(229,57,53,0.25);
  --bg:         #0d0d0d;
  --surface:    #161616;
  --surface2:   #1e1e1e;
  --surface3:   #272727;
  --border:     rgba(255,255,255,0.07);
  --text:       #f0f0f0;
  --muted:      #888;
  --green:      #2ecc71;
  --yellow:     #f39c12;
  --font-head:  'Syne', sans-serif;
  --font-body:  'DM Sans', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
}

/* ── Login Screen ───────────────────────────────── */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at 50% 0%, rgba(229,57,53,0.15) 0%, transparent 65%), var(--bg);
}

.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

.login-box .brand {
  font-family: var(--font-head);
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--red);
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}

.login-box .sub {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 36px;
}

.login-box input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.95rem;
  margin-bottom: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.login-box input:focus { border-color: var(--red); }

.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--red-dark), var(--red));
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: var(--font-head);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--red-glow); }
.btn-primary:active { transform: translateY(0); }

#login-error {
  color: var(--red);
  font-size: 0.85rem;
  margin-top: 12px;
  min-height: 20px;
}

/* ── App Shell ──────────────────────────────────── */
#app { display: none; flex-direction: column; min-height: 100vh; }

/* ── Topbar ─────────────────────────────────────── */
.topbar {
  height: 64px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-brand {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 1.15rem;
  letter-spacing: -0.3px;
}

.topbar-brand span { color: var(--red); }

.topbar-actions { display: flex; align-items: center; gap: 12px; }

.btn-save {
  background: linear-gradient(135deg, var(--red-dark), var(--red));
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 20px;
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.btn-save:hover { box-shadow: 0 4px 16px var(--red-glow); transform: translateY(-1px); }

.btn-logout {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 16px;
  font-family: var(--font-body);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-logout:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

.save-status {
  font-size: 0.8rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.save-status.saved { color: var(--green); }
.save-status.saving { color: var(--yellow); }

/* ── Main Layout ────────────────────────────────── */
.main-layout {
  display: flex;
  flex: 1;
}

/* ── Sidebar ────────────────────────────────────── */
.sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  position: sticky;
  top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
}

.sidebar-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 10px;
  margin-bottom: 10px;
  margin-top: 20px;
}
.sidebar-label:first-child { margin-top: 0; }

.sidebar-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: none;
  background: none;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  margin-bottom: 2px;
}
.sidebar-btn:hover { background: var(--surface2); color: var(--text); }
.sidebar-btn.active { background: var(--surface3); color: var(--text); }
.sidebar-btn .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
}
.sidebar-btn .count {
  margin-left: auto;
  background: var(--surface3);
  color: var(--muted);
  font-size: 0.72rem;
  padding: 2px 7px;
  border-radius: 20px;
}

/* ── Content ────────────────────────────────────── */
.content {
  flex: 1;
  padding: 32px 36px;
  overflow-y: auto;
}

/* ── Section Header ─────────────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.section-title {
  font-family: var(--font-head);
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.section-title span { color: var(--red); }

.btn-add {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px dashed rgba(229,57,53,0.4);
  color: var(--red);
  border-radius: 8px;
  padding: 9px 18px;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-add:hover { background: rgba(229,57,53,0.08); border-color: var(--red); }

/* ── Cards ──────────────────────────────────────── */
.item-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 10px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
}
.item-card:hover { border-color: rgba(255,255,255,0.12); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.item-card.daily-card { border-left: 3px solid var(--red); }

.card-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.card-row .field-day {
  width: 120px;
  flex-shrink: 0;
}

.field-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.field-label {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--muted);
  font-weight: 600;
}

.field-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.field-input:focus { border-color: var(--red); background: var(--surface3); }

.field-input.price-input {
  width: 110px;
  flex-shrink: 0;
  font-weight: 700;
  color: var(--red);
}

.field-input.unit-input {
  width: 80px;
  flex-shrink: 0;
}

.card-actions {
  position: absolute;
  top: 14px;
  right: 16px;
  display: flex;
  gap: 6px;
}

.btn-del {
  background: rgba(229,57,53,0.1);
  border: none;
  color: var(--red);
  border-radius: 6px;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-del:hover { background: rgba(229,57,53,0.25); }

/* ── Settings Panel ─────────────────────────────── */
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.settings-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px;
}

.settings-card h3 {
  font-family: var(--font-head);
  font-size: 0.9rem;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── Sections Manager ───────────────────────────── */
.section-mgr-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.section-mgr-item .drag-handle {
  color: var(--muted);
  cursor: grab;
  font-size: 1.1rem;
  user-select: none;
}

/* ── Toast ──────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 0.88rem;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  pointer-events: none;
  max-width: 300px;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.success { border-color: rgba(46,204,113,0.4); }
#toast.error { border-color: rgba(229,57,53,0.4); }

/* ── Modal ──────────────────────────────────────── */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#modal-overlay.open { display: flex; }

.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 32px;
  max-width: 440px;
  width: 90%;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}

.modal-box h3 {
  font-family: var(--font-head);
  font-size: 1.2rem;
  font-weight: 800;
  margin-bottom: 12px;
}

.modal-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }

.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

.btn-cancel {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 10px 20px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-cancel:hover { border-color: rgba(255,255,255,0.2); }

.btn-confirm-del {
  background: linear-gradient(135deg, #b71c1c, #e53935);
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 10px 20px;
  font-family: var(--font-head);
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

/* ── Section Add Modal ───────────────────────────── */
.section-type-btns {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.type-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s;
  text-align: center;
}
.type-btn.selected {
  border-color: var(--red);
  color: var(--text);
  background: rgba(229,57,53,0.08);
}

/* ── Mobile Drawer ──────────────────────────────── */
#drawer-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  backdrop-filter: blur(3px);
}
#drawer-overlay.open { display: block; }

#drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  z-index: 300;
  padding: 0 16px 40px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height: 82vh;
  overflow-y: auto;
}
#drawer.open { transform: translateY(0); }

#drawer .drawer-handle {
  width: 40px; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  margin: 14px auto 20px;
}

#drawer .drawer-section-label {
  font-family: var(--font-head);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 4px;
  margin-bottom: 8px;
  margin-top: 4px;
}

#drawer .drawer-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 13px 14px;
  border-radius: 12px;
  border: none;
  background: none;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  margin-bottom: 3px;
}
#drawer .drawer-btn.active { background: var(--surface2); color: var(--text); }
#drawer .drawer-btn .dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
}
#drawer .drawer-btn .count {
  margin-left: auto;
  background: var(--surface3);
  color: var(--muted);
  font-size: 0.75rem;
  padding: 2px 8px;
  border-radius: 20px;
}
#drawer .drawer-divider {
  height: 1px;
  background: var(--border);
  margin: 12px 0;
}

/* ── Bottom Nav Bar ─────────────────────────────── */
#bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 62px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  z-index: 150;
  align-items: center;
  justify-content: space-around;
  padding: 0 8px;
}

.bnav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 0.65rem;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 12px;
  transition: all 0.15s;
  flex: 1;
}
.bnav-btn .bnav-icon { font-size: 1.25rem; line-height: 1; }
.bnav-btn.active { color: var(--red); }

/* ── Responsive ─────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { display: none !important; }
  #bottom-nav { display: flex; }
  .topbar { padding: 0 14px; height: 56px; }
  .topbar-brand { font-size: 1rem; }
  .save-status { display: none; }
  .btn-logout { padding: 7px 11px; font-size: 0.75rem; }
  .btn-save { padding: 7px 13px; font-size: 0.78rem; }
  .content { padding: 16px 14px 84px; }
  .settings-grid { grid-template-columns: 1fr; }
  .card-row { flex-direction: column; }
  .card-row .field-day { width: 100%; }
  .field-input.price-input { width: 100%; }
  .field-input.unit-input { width: 100%; }
  .section-header { flex-direction: column; align-items: flex-start; gap: 12px; }
  .section-header > div:last-child { width: 100%; display: flex; gap: 8px; }
  .btn-add { flex: 1; justify-content: center; }
  .modal-box { border-radius: 18px; padding: 24px 18px; }
  #toast { bottom: 74px; right: 14px; left: 14px; max-width: 100%; font-size: 0.85rem; }
}

/* ── Pill Badge ─────────────────────────────────── */
.pill {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.pill.daily { background: rgba(229,57,53,0.15); color: var(--red); }
.pill.menu { background: rgba(46,204,113,0.12); color: var(--green); }

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="brand">Macro's Kitchen</div>
    <div class="sub">Admin Dashboard · Sign In</div>
    <input type="text" id="login-user" placeholder="Username" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">Macro's <span>Admin</span></div>
    <div class="topbar-actions">
      <div class="save-status" id="save-status">All changes saved</div>
      <button class="btn-save" onclick="saveDB()">💾 Save Changes</button>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="main-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content" id="content"></main>
  </div>
</div>

<!-- ── BOTTOM NAV (mobile) ──────────────────────── -->
<div id="bottom-nav">
  <button class="bnav-btn" id="bnav-menu" onclick="openDrawer()">
    <span class="bnav-icon">☰</span>
    <span>Sections</span>
  </button>
  <button class="bnav-btn" id="bnav-save" onclick="saveDB()">
    <span class="bnav-icon">💾</span>
    <span>Save</span>
  </button>
  <button class="bnav-btn" id="bnav-settings" onclick="showSettings();closeDrawer()">
    <span class="bnav-icon">⚙️</span>
    <span>Info</span>
  </button>
  <button class="bnav-btn" id="bnav-preview" onclick="window.open('index.html','_blank')">
    <span class="bnav-icon">🔗</span>
    <span>Preview</span>
  </button>
</div>

<!-- ── DRAWER (mobile nav) ────────────────────────── -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="drawer-handle"></div>
  <div id="drawer-content"></div>
</div>

<!-- ── TOAST ─────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── MODAL ─────────────────────────────────────── -->
<div id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ── Credentials (change these!) ───────────────────
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'macros2024';

// ── State ─────────────────────────────────────────
let db = null;
let currentView = null;
let pendingDeleteCallback = null;

// ── Login ─────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').style.flexDirection = 'column';
    initApp();
  } else {
    document.getElementById('login-error').textContent = '✖ Invalid credentials';
  }
}

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

// ── Load DB ───────────────────────────────────────
async function initApp() {
  try {
    const res = await fetch('db.json?v=' + Date.now());
    db = await res.json();
    buildSidebar();
    if (db.sections.length) showSection(db.sections[0].id);
    else showSettings();
  } catch(e) {
    showToast('⚠️ Could not load db.json', 'error');
    // Start with blank db
    db = { restaurant: { name: "Macro's Kitchen", logo: "logo.jpg", whatsapp: "+96179164160", whatsappMessage: "Hello, I'd like to make a reservation.", googleMapsUrl: "", location: "" }, sections: [] };
    buildSidebar();
    showSettings();
  }
}

// ── Sidebar ───────────────────────────────────────
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  // Clear completely first
  while (sidebar.firstChild) sidebar.removeChild(sidebar.firstChild);

// ── Item CRUD ─────────────────────────────────────
function updateField(sectionId, itemId, field, value) {
  const sec = db.sections.find(s => s.id === sectionId);
  const item = sec?.items.find(i => i.id === itemId);
  if (item) { item[field] = value; markUnsaved(); }
}

function addItem(sectionId) {
  const sec = db.sections.find(s => s.id === sectionId);
  if (!sec) return;
  const newId = sectionId + '_' + Date.now();
  const newItem = sec.type === 'daily'
    ? { id: newId, day: 'Monday', name: 'New Dish', description: '', price: 10.00 }
    : { id: newId, name: 'New Item', description: '', price: 5.00 };
  sec.items.push(newItem);
  markUnsaved();
  showSection(sectionId);
  // Scroll to bottom
  setTimeout(() => {
    const card = document.getElementById('card-' + newId);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function confirmDeleteItem(sectionId, itemId) {
  const sec = db.sections.find(s => s.id === sectionId);
  const item = sec?.items.find(i => i.id === itemId);
  showModal(
    'Delete Item',
    `Remove <strong>${esc(item?.name || 'this item')}</strong> from the menu?`,
    () => {
      sec.items = sec.items.filter(i => i.id !== itemId);
      markUnsaved();
      showSection(sectionId);
      closeModal();
      showToast('Item removed', 'success');
    }
  );
}

// ── Section CRUD ──────────────────────────────────
function confirmDeleteSection(sectionId) {
  const sec = db.sections.find(s => s.id === sectionId);
  showModal(
    'Delete Section',
    `Remove the entire <strong>${esc(sec?.label)}</strong> section including all its items? This cannot be undone.`,
    () => {
      db.sections = db.sections.filter(s => s.id !== sectionId);

// ── Save DB → GitHub API ──────────────────────────
async function saveDB() {
  const cfg = getGHConfig();
  if (!cfg || !cfg.token || !cfg.repo || !cfg.path) {
    showGitHubSetupModal(async () => { await saveDB(); });
    return;
  }
  setStatus('saving', '⟳ Publishing…');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))));
    // Get current file SHA (required by GitHub API to update)
    const [owner, repo] = cfg.repo.split('/');
    const branch = cfg.branch || 'main';
    const apiBase = `https://api.github.com/repos/${owner}/${repo}/contents/${cfg.path}`;
    const headers = {
      'Authorization': `token ${cfg.token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    };
    // Fetch current SHA
    let sha = null;
    const getRes = await fetch(`${apiBase}?ref=${branch}`, { headers });
    if (getRes.ok) {
      const fileData = await getRes.json();
      sha = fileData.sha;
    } else if (getRes.status !== 404) {
      throw new Error(`GitHub error ${getRes.status}: ${await getRes.text()}`);
    }
    // Commit the update
    const body = {
      message: `Menu update ${new Date().toLocaleString()}`,
      content,
      branch
    };
    if (sha) body.sha = sha;
    const putRes = await fetch(apiBase, {
      method: 'PUT',
      headers,
      body: JSON.stringify(body)
    });
    if (!putRes.ok) {
      const err = await putRes.json();
      throw new Error(err.message || `GitHub PUT failed ${putRes.status}`);
    }
    setStatus('saved', '✓ Published');
    showToast('🚀 Saved & published! Site will update in ~30s.', 'success');
    buildSidebar();
  } catch(e) {
    console.error(e);
    setStatus('', '⚠ Save failed');
    showToast('❌ ' + e.message, 'error');
  }
}

async function doSaveGHConfig(cb) {
  const token  = document.getElementById('gh-token').value.trim();
  const repo   = document.getElementById('gh-repo').value.trim();
  const branch = document.getElementById('gh-branch').value.trim() || 'main';
  const path   = document.getElementById('gh-path').value.trim() || 'db.json';
  const errEl  = document.getElementById('gh-error');

  if (!token) { errEl.textContent = 'Token is required.'; return; }
  if (!repo || !repo.includes('/')) { errEl.textContent = 'Repo must be owner/repo format.'; return; }

  // Verify token works by fetching repo info
  errEl.textContent = '⟳ Verifying…';
  document.getElementById('gh-save-btn').disabled = true;
  try {
    const chk = await fetch(`https://api.github.com/repos/${repo}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!chk.ok) throw new Error(`Cannot access repo (${chk.status}). Check token & repo name.`);
  } catch(e) {
    errEl.textContent = '❌ ' + e.message;
    document.getElementById('gh-save-btn').disabled = false;
    return;
  }

  saveGHConfig({ token, repo, branch, path });
  closeModal();
  showToast('✅ GitHub connected!', 'success');
  if (cb) cb();
}

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function markUnsaved() {
  setStatus('', '● Unsaved changes');
  document.getElementById('save-status').style.color = 'var(--yellow)';
}

function setStatus(cls, text) {
  const el = document.getElementById('save-status');
  el.textContent = text;
  el.className = 'save-status ' + cls;
}

// ── Modal ─────────────────────────────────────────
function showModal(title, bodyHtml, onConfirm) {
  const box = document.getElementById('modal-box');
  box.innerHTML = `
    <h3>${title}</h3>
    <p>${bodyHtml}</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm-del" id="modal-confirm-btn">Delete</button>
    </div>
  `;
  document.getElementById('modal-confirm-btn').onclick = onConfirm;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ── Toast ─────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 3000);
}

// ── Utils ─────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Keyboard shortcut: Ctrl+S to save
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveDB();
  }
});
</script>
