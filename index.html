<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Macro's Kitchen Menu</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background: #121212;
  color: #fff;
  padding: 20px;
  font-family: 'Segoe UI', sans-serif;
}
h1 { font-weight: 700; letter-spacing: 1px; }
.tabs-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs-wrapper::-webkit-scrollbar { display: none; }
.nav-pills {
  flex-wrap: nowrap;
  width: max-content;
  margin: auto;
  gap: 10px;
}
.nav-pills .nav-link {
  background: #1f1f1f;
  color: #fff;
  border-radius: 50px;
  padding: 10px 18px;
  white-space: nowrap;
  transition: all 0.3s ease;
}
.nav-pills .nav-link.active {
  background: linear-gradient(45deg,#c1442e,#e53935);
  box-shadow: 0 4px 15px rgba(229,57,53,0.4);
}
.tab-pane { animation: fadeSlide 0.4s ease; }
@keyframes fadeSlide {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
.menu-row {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.menu-left { flex:1; }
.menu-name { font-weight:600; }
.menu-description {
  font-size:0.85rem;
  font-style:italic;
  opacity:0.8;
  margin-top:3px;
}
.price {
  width:110px;
  text-align:right;
  font-weight:bold;
  color:#e53935;
}
.day-title {
  color:#e53935;
  font-weight:600;
  margin-top:20px;
  margin-bottom:5px;
}
.whatsapp-btn {
  display:inline-block;
  background:#25D366;
  color:white;
  padding:10px 20px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  margin-bottom:15px;
  transition:0.3s;
}
.whatsapp-btn:hover { background:#1ebe5d; }
.review-btn {
  display:inline-block;
  background:#4285F4;
  color:white;
  padding:10px 20px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  margin-bottom:15px;
  margin-left:10px;
  transition:0.3s;
}
.review-btn:hover { background:#3367d6; }
.footer {
  margin-top:50px;
  text-align:center;
  font-size:0.9rem;
  opacity:0.9;
}
.footer a {
  color:#e53935;
  text-decoration:none;
  font-weight:bold;
}
.footer a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="container">

  <div class="text-center mb-4">
    <img id="restaurant-logo" src="logo.jpg" class="rounded-circle mb-3" style="width:100px;height:100px;object-fit:cover;">
    <h1 id="restaurant-name">Macro's Kitchen</h1>
  </div>

  <!-- Tabs -->
  <div class="tabs-wrapper mb-4">
    <ul class="nav nav-pills" id="menu-tabs" role="tablist"></ul>
  </div>

  <div class="tab-content" id="menu-content"></div>

  <div class="footer" id="footer-area"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadMenu() {
  // Add cache-busting so edits appear immediately
  const res = await fetch('db.json?v=' + Date.now());
  const db = await res.json();

  const r = db.restaurant;
  document.title = r.name + ' Menu';
  document.getElementById('restaurant-name').textContent = r.name;
  if (r.logo) document.getElementById('restaurant-logo').src = r.logo;

  const tabsEl = document.getElementById('menu-tabs');
  const contentEl = document.getElementById('menu-content');

  db.sections.forEach((section, idx) => {
    // Tab button
    const li = document.createElement('li');
    li.className = 'nav-item';
    li.innerHTML = `<button class="nav-link${idx===0?' active':''}" data-bs-toggle="pill" data-bs-target="#tab_${section.id}">${section.label}</button>`;
    tabsEl.appendChild(li);

    // Tab pane
    const pane = document.createElement('div');
    pane.className = `tab-pane fade${idx===0?' show active':''}`;
    pane.id = `tab_${section.id}`;

    if (section.type === 'daily') {
      section.items.forEach(item => {
        pane.innerHTML += `
          <div class="day-title">${item.day}</div>
          <div class="menu-row">
            <div class="menu-left">
              <div class="menu-name">${item.name}</div>
              ${item.description ? `<div class="menu-description">${item.description}</div>` : ''}
            </div>
            <div class="price">$${Number(item.price).toFixed(2)}</div>
          </div>`;
      });
    } else {
      section.items.forEach(item => {
        const priceStr = item.unit ? `$${Number(item.price).toFixed(2)}/${item.unit}` : `$${Number(item.price).toFixed(2)}`;
        pane.innerHTML += `
          <div class="menu-row">
            <div class="menu-left">
              <div class="menu-name">${item.name}</div>
              ${item.description ? `<div class="menu-description">${item.description}</div>` : ''}
            </div>
            <div class="price">${priceStr}</div>
          </div>`;
      });
    }

    contentEl.appendChild(pane);
  });

  // Footer
  const waLink = `https://wa.me/${r.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(r.whatsappMessage)}`;
  document.getElementById('footer-area').innerHTML = `
    <a href="${waLink}" target="_blank" class="whatsapp-btn">💬 WhatsApp: ${r.whatsapp}</a>
    <a href="${r.googleMapsUrl}" target="_blank" class="review-btn">⭐ Leave us a review on Google</a>
    <p>📍 ${r.location}</p>
    <p>© ${new Date().getFullYear()} <a href="https://v8softwares.com" target="_blank">V8 Softwares</a>. All Rights Reserved.</p>
  `;
}

loadMenu();
</script>
</body>
</html>
